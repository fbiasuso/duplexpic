<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DuplexPic</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <div id="canvas" class="a4-sheet">
        <div id="slot-top" class="slot">
          <div class="slot-placeholder">
            <span>🖼️ Haga clic para cargar imagen superior</span>
          </div>
          <img class="slot-image" src="" alt="Imagen superior" />
        </div>
        <div id="slot-bottom" class="slot">
          <div class="slot-placeholder">
            <span>🖼️ Haga clic para cargar imagen inferior</span>
          </div>
          <img class="slot-image" src="" alt="Imagen inferior" />
        </div>
      </div>
    </div>
    <script type="module" src="app.js"></script>
  </body>
</html>
