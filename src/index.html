<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuplexPic</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div class="global-buttons">
        <button data-action="swap" title="Intercambiar">⇅ Intercambiar</button>
        <button data-action="clear-all" title="Limpiar todo">🗑️ Limpiar todo</button>
        <button data-action="orientation" title="Cambiar orientación"></button>
      </div>
      <div class="tabs-nav">
        <button data-tab="margins" class="active">Márgenes</button>
        <button data-tab="image">Imagen</button>
        <button data-tab="print">Impresión</button>
      </div>
      <div class="tab-content">
        <div id="tab-margins" class="tab-pane active">
          <div class="property-group">
            <label>Margen superior</label>
            <div class="value" id="margin-top-value">10 mm</div>
            <input type="range" id="margin-top" min="0" max="20" step="1" value="10" />
          </div>
          <div class="property-group">
            <label>Margen inferior</label>
            <div class="value" id="margin-bottom-value">10 mm</div>
            <input type="range" id="margin-bottom" min="0" max="20" step="1" value="10" />
          </div>
          <div class="property-group">
            <label>Margen izquierdo</label>
            <div class="value" id="margin-left-value">10 mm</div>
            <input type="range" id="margin-left" min="0" max="20" step="1" value="10" />
          </div>
          <div class="property-group">
            <label>Margen derecho</label>
            <div class="value" id="margin-right-value">10 mm</div>
            <input type="range" id="margin-right" min="0" max="20" step="1" value="10" />
          </div>
          <div class="property-group">
            <label>Medianil (gutter)</label>
            <div class="value" id="margin-gutter-value">5 mm</div>
            <input type="range" id="margin-gutter" min="0" max="20" step="1" value="5" />
          </div>
          <button data-action="apply-margins" class="apply-btn">Aplicar</button>
          <button data-action="cancel-margins" class="cancel-btn">Cancelar</button>
        </div>
        <div id="tab-image" class="tab-pane">
          <p class="slot-info-placeholder">Seleccioná un slot</p>
        </div>
        <div id="tab-print" class="tab-pane">
          <!-- DPI -->
          <div class="property-group">
            <label>DPI</label>
            <div class="dpi-selector">
              <label class="dpi-option">
                <input type="radio" name="dpi" value="150" />
                <span>150 DPI</span>
              </label>
              <label class="dpi-option">
                <input type="radio" name="dpi" value="300" checked />
                <span>300 DPI</span>
              </label>
              <label class="dpi-option">
                <input type="radio" name="dpi" value="600" />
                <span>600 DPI</span>
              </label>
            </div>
          </div>

          <!-- Page size -->
          <div class="property-group">
            <label>Tamaño de hoja</label>
            <select id="page-size" data-print-setting="pageSize">
              <option value="A4">A4</option>
              <option value="A5">A5</option>
              <option value="Letter">Letter</option>
            </select>
          </div>

          <!-- Copies -->
          <div class="property-group">
            <label>Copias</label>
            <div class="value" id="copies-value">1</div>
            <input type="range" id="copies" min="1" max="30" step="1" value="1" />
          </div>

          <!-- Selected slots -->
          <div class="property-group">
            <label>Slots a incluir</label>
            <div class="slot-selector">
              <label class="slot-option">
                <input type="radio" name="selectedSlots" value="both" checked />
                <span>Ambos</span>
              </label>
              <label class="slot-option">
                <input type="radio" name="selectedSlots" value="top" />
                <span>Solo superior</span>
              </label>
              <label class="slot-option">
                <input type="radio" name="selectedSlots" value="bottom" />
                <span>Solo inferior</span>
              </label>
            </div>
          </div>

          <!-- Grayscale -->
          <label class="print-toggle">
            <input type="checkbox" id="grayscale" data-print-setting="grayscale" />
            <span>Escala de grises (ahorra tóner)</span>
          </label>

          <!-- Crop marks -->
          <label class="print-toggle">
            <input type="checkbox" id="crop-marks" data-print-setting="cropMarks" />
            <span>Marcas de corte</span>
          </label>

          <!-- Print method -->
          <div class="property-group">
            <label>Método de impresión</label>
            <div class="method-selector">
              <label class="method-option">
                <input type="radio" name="printMethod" value="direct" checked />
                <span>Directo (Rust)</span>
              </label>
              <label class="method-option">
                <input type="radio" name="printMethod" value="open" />
                <span>Abrir PDF en mi visor</span>
              </label>
            </div>
          </div>

          <!-- Actions -->
          <button data-action="save-pdf" class="action-btn">Guardar PDF</button>
          <button data-action="print-compose" class="action-btn primary">Imprimir</button>
          <div id="print-status" class="print-status"></div>
        </div>
      </div>
    </div>

    <!-- CANVAS ZONE -->
    <div id="canvas-zone">

      <div id="canvas-scroll">
        <div id="canvas-inner" class="canvas-frame" style="width:595px;height:842px">
          <div id="canvas" class="a4-sheet portrait">
            <div id="margin-guide-top" class="margin-guide" style="display:none"></div>
            <div id="margin-guide-bottom" class="margin-guide" style="display:none"></div>
            <div id="margin-guide-left" class="margin-guide" style="display:none"></div>
            <div id="margin-guide-right" class="margin-guide" style="display:none"></div>
            <div id="margin-guide-gutter" class="margin-guide" style="display:none"></div>
            <div id="slot-top" class="slot">
              <div class="slot-placeholder">
                <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21,15 16,10 5,21"/>
                </svg>
                <span>Haga clic para cargar imagen superior</span>
              </div>
              <div class="slot-loader"></div>
              <img class="slot-image" src="" alt="Imagen superior" />
            </div>
            <div id="slot-bottom" class="slot">
              <div class="slot-placeholder">
                <svg class="placeholder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21,15 16,10 5,21"/>
                </svg>
                <span>Haga clic para cargar imagen inferior</span>
              </div>
              <div class="slot-loader"></div>
              <img class="slot-image" src="" alt="Imagen inferior" />
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ZOOM BAR (fixed, independiente) -->
    <div class="zoom-bar">
      <button data-zoom="out" title="Alejar">−</button>
      <input type="range" id="zoom-slider" min="50" max="200" value="100" />
      <span class="zoom-label" id="zoom-label">100%</span>
      <button data-zoom="in" title="Acercar">+</button>
    </div>
  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
